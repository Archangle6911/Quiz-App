<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QuizMaster</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />


  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" >
</head>
<body>
  <div class="page">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <!-- NAV -->
    <header class="navbar">
      <div class="logo">QuizMaster</div>
      <nav class="nav-links">
        <a href="#">About</a>
        <a href="#">Login</a>
      </nav>
    </header>


    <main class="hero">
      <div class="hero-inner">
        <h1 class="hero-title">Test Your Knowledge Instantly</h1>
        <p class="hero-subtitle">
          Boost your skills with interactive quizzes across multiple categories.
        </p>

        <button class="btn-primary">Start Quiz</button>

        <div class="icon-row">
          <div class="icon-pill">?</div>
          <div class="icon-pill">📘</div>
          <div class="icon-pill">🧠</div>
          <div class="icon-pill">💡</div>
        </div>
      </div>
    </main>

  </div>
</body>
</html>
